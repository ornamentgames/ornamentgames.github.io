    <script>
        // Adjust Logo Size
        window.onload = function() { adjustLogoSize(); window.addEventListener('resize', adjustLogoSize); };
        function adjustLogoSize() {
            var logo = document.getElementById('logo-title');
            if(!logo) return;
            var logoWidth = window.innerWidth * 0.2;
            if (logoWidth > 300) logoWidth = 300;
            logo.style.width = logoWidth + 'px';
        }

        // ORIGINAL VIDEO PLAYER SCRIPT
        (function() {
            var video = document.getElementById('scoolbase-ad-video');
            var player = document.getElementById('scoolbase-ad-player');
            var overlay = document.getElementById('scoolbase-ad-overlay');
            var spinner = document.getElementById('scoolbase-ad-spinner');
            var controls = document.getElementById('scoolbase-ad-controls');
            var playPauseBtn = document.getElementById('scoolbase-ad-playpause');
            var progressFill = document.getElementById('scoolbase-ad-progress-fill');
            var progressBuf = document.getElementById('scoolbase-ad-progress-buffer');
            var progressWrap = document.getElementById('scoolbase-ad-progress-wrap');
            var timeDisplay = document.getElementById('scoolbase-ad-time');
            var muteBtn = document.getElementById('scoolbase-ad-mute');
            var fsBtn = document.getElementById('scoolbase-ad-fs');
            
            if (!video) return;
            var hasStarted = false;
            var HIDE_DELAY = 2500;
            var hideTimer = null;

            function showControls() { player.classList.add('controls-visible'); clearTimeout(hideTimer); }
            function scheduleHide() {
                clearTimeout(hideTimer);
                if (!video.paused) {
                    hideTimer = setTimeout(function() { player.classList.remove('controls-visible'); }, HIDE_DELAY);
                }
            }
            function showControlsAndReschedule() { showControls(); scheduleHide(); }
            function formatTime(s) {
                s = Math.floor(s) || 0;
                var m = Math.floor(s / 60);
                var sec = s % 60;
                return m + ':' + (sec < 10 ? '0' : '') + sec;
            }
            function setPlayIcons(playing) {
                playPauseBtn.querySelector('.scoolbase-icon-play').style.display = playing ? 'none' : '';
                playPauseBtn.querySelector('.scoolbase-icon-pause').style.display = playing ? '' : 'none';
            }
            function setMuteIcons(muted) {
                muteBtn.querySelector('.scoolbase-icon-vol').style.display = muted ? 'none' : '';
                muteBtn.querySelector('.scoolbase-icon-mute').style.display = muted ? '' : 'none';
            }
            function togglePlay() { if (video.paused) video.play(); else video.pause(); }
            function toggleMute() { video.muted = !video.muted; setMuteIcons(video.muted); }
            function toggleFullscreen() {
                if (!document.fullscreenElement) player.requestFullscreen();
                else document.exitFullscreen();
            }

            player.addEventListener('mousemove', showControlsAndReschedule);
            player.addEventListener('touchstart', showControlsAndReschedule, { passive: true });
            overlay.addEventListener('click', togglePlay);
            playPauseBtn.addEventListener('click', togglePlay);
            muteBtn.addEventListener('click', toggleMute);
            fsBtn.addEventListener('click', toggleFullscreen);
            video.addEventListener('click', togglePlay);

            video.addEventListener('play', function() {
                hasStarted = true;
                player.classList.remove('vp-unloaded');
                overlay.classList.add('hidden');
                player.classList.add('playing');
                setPlayIcons(true);
                showControlsAndReschedule();
            });
            video.addEventListener('pause', function() {
                player.classList.remove('playing');
                if (video.currentTime < 0.5) {
                    overlay.classList.remove('hidden');
                    player.classList.remove('controls-visible');
                } else { showControls(); }
                setPlayIcons(false);
            });
            video.addEventListener('timeupdate', function() {
                if (!video.duration) return;
                var pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
            });
            video.addEventListener('progress', function() {
                if (video.buffered.length > 0 && video.duration) {
                    var bufPct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
                    progressBuf.style.width = bufPct + '%';
                }
            });
            progressWrap.addEventListener('click', function(e) {
                if (!hasStarted || !video.duration) return;
                var rect = progressWrap.getBoundingClientRect();
                var pct = (e.clientX - rect.left) / rect.width;
                video.currentTime = pct * video.duration;
            });
            video.addEventListener('waiting', function() { spinner.classList.add('visible'); });
            video.addEventListener('canplay', function() { spinner.classList.remove('visible'); });
        })();

        // Splash text script
        $(document).ready(function () {
            var splash = ["Hi there Brandon, Hi Austin, Hi Tyler Khauv!"];
            $(".desc").text(splash[0]);
        });

        // Particles initialization
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#ffffff' },
                opacity: { value: 0.5 },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.4, width: 1 },
                move: { enable: true, speed: 6 }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' } }
            },
            retina_detect: true
        });
    </script>
