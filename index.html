    <script>
        window.onload = function() {
            adjustLogoSize();
            window.addEventListener('resize', adjustLogoSize);
        };

        function adjustLogoSize() {
            var logo = document.getElementById('logo-title');
            var logoWidthPercentage = 20;
            var maxWidth = 300; 
            var logoWidth = window.innerWidth * (logoWidthPercentage / 100);
            if (logoWidth > maxWidth) logoWidth = maxWidth;
            if (logo) logo.style.width = logoWidth + 'px';
        }

        $(document).ready(function () {
            var splash = ["Hi there Beau Butler!"];
            var currentIndex = 0;
            function updateSplash() {
                $(".desc").text(splash[currentIndex]);
                currentIndex = (currentIndex + 1) % splash.length;
            }
            updateSplash();
        });

        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#ffffff' },
                shape: { type: 'circle' },
                opacity: { value: 0.5 },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.4, width: 1 },
                move: { enable: true, speed: 6, direction: 'none', random: false, out_mode: 'out' }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
                modes: { repulse: { distance: 200, duration: 0.4 }, push: { particles_nb: 4 } }
